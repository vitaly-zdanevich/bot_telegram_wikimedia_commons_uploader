# Cloud Native Buildpacks project descriptor, read by the Toolforge Build Service.
# Only buildpack builds (Toolforge) read this; the Lambda Docker build and CI/cargo ignore it.
#
# Build a portable binary for Toolforge workers.
#
# Toolforge is a shared cluster, so the run node can have a lower CPU ISA level than the
# build node or the local development machine. Keep this at baseline x86-64 unless the
# service is pinned to known-compatible hardware.
[[build.env]]
name = "RUSTFLAGS"
value = "-C target-cpu=x86-64"

# Toolforge's current default deb-packages buildpack reads this table. Keep Aptfile too
# for older/deprecated buildpack stacks.
[com.heroku.buildpacks.deb-packages]
install = [
    "unar",
    "libraw-bin",
    "yt-dlp",
    "ffmpeg",
    "curl",
]
