# Cloud Native Buildpacks project descriptor, read by the Toolforge Build Service.
# Only buildpack builds (Toolforge) read this; the Lambda Docker build and CI/cargo ignore it.
#
# Tune the Rust build for the build node's CPU.
#
# WARNING: target-cpu=native emits instructions for the CPU of the BUILD node. Toolforge is a
# shared cluster, so the RUN node may have a different microarchitecture. If the bot crashes
# with "illegal instruction" (SIGILL), change the value below to "-C target-cpu=x86-64-v3"
# (portable across all modern servers). On a single-host Cloud VPS, native is always safe.
[[build.env]]
name = "RUSTFLAGS"
value = "-C target-cpu=native"

# Toolforge's current default deb-packages buildpack reads this table. Keep Aptfile too
# for older/deprecated buildpack stacks.
[com.heroku.buildpacks.deb-packages]
install = [
    "unar",
]
